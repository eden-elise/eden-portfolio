<main id="main-content" class="contact-layout">
    <section id="contact-info" aria-labelledby="contact-info-heading">
        <h2 id="contact-info-heading">Get in Touch</h2>
        <p>Feel free to reach out through the form below or find me on any of these:</p>
        <address>
            <ul>
                <li>
                    <a href="mailto:edentripp@sandiego.edu">edentripp@sandiego.edu</a>
                </li>
                <li>
                    <a href="https://github.com/eden-elise"
                       target="_blank"
                       rel="noopener noreferrer">GitHub</a>
                </li>
                <li>
                    <a href="https://www.linkedin.com/in/eden-tripp/"
                       target="_blank"
                       rel="noopener noreferrer">LinkedIn</a>
                </li>
            </ul>
        </address>
    </section>

    <section id="contact-form" aria-labelledby="contact-form-heading">
        <h2 id="contact-form-heading">Send a Message</h2>
        <!--
            action points at the Formspree endpoint.
            method="POST" is required — GET would expose the
            message content in the URL, which is wrong for forms.
        -->
        <form action="https://formspree.io/f/xlgzqjve" method="POST">

            <!--
                _subject is a Formspree magic field — it sets the
                subject line of the email you receive.
                type="hidden" means it's never shown to the user.
            -->
            <input type="hidden" name="_subject" value="New message from your portfolio" />
            <p>
                <label for="name">Name</label>
                <input
                        type="text"
                        id="name"
                        name="name"
                        autocomplete="name"
                        required
                        placeholder="Your name"
                />
            </p>

            <p>
                <label for="email">Email</label>
                <input
                        type="email"
                        id="email"
                        name="email"
                        autocomplete="email"
                        required
                        placeholder="your@email.com"
                />
            </p>

            <p>
                <label for="message">Message</label>
                <textarea
                        id="message"
                        name="message"
                        required
                        minlength="10"
                        rows="6"
                        placeholder="What's on your mind?"
                ></textarea>
            </p>

            <button type="submit">Send Message</button>

        </form>
    </section>

</main>

<div class="theme-switcher" role="group" aria-label="Theme selector">
    <span class="theme-switcher__label">Choose a theme</span>
